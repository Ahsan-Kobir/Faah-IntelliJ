<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <filter id="glowD">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="40" height="40" rx="8" fill="#111111"/>

  <!-- Sound Waves (arcs on right side like a speaker) -->
  <g stroke="#FF3B3B" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.55">
    <path d="M24,14 A9,9 0 0,1 24,26"/>
    <path d="M27,11 A14,14 0 0,1 27,29"/>
    <path d="M30,8  A19,19 0 0,1 30,32"/>
  </g>

  <!-- Main Text -->
  <text x="44%" y="54%"
        text-anchor="middle"
        dominant-baseline="middle"
        font-family="Arial, sans-serif"
        font-size="14"
        font-weight="900"
        fill="#FF3B3B"
        filter="url(#glowD)">
    FA!
  </text>

</svg>
